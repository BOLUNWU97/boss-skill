name: Release Boss Skill

on:
  push:
    tags:
      - 'v*'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install pytest pytest-cov black flake8
          pip install -r requirements.txt
      
      - name: Lint with black
        run: |
          black --check tools/ prompts/
      
      - name: Run tests
        run: |
          pytest tests/ -v --cov=tools --cov=prompts
      
      - name: Security scan
        run: |
          pip install bandit safety
          bandit -r tools/
          safety check

  docker:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release:
    runs-on: ubuntu-latest
    needs: [test, docker]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            Dockerfile
            docker-compose.yml
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  clawhub:
    runs-on: ubuntu-latest
    needs: release
    steps:
      - name: Submit to ClawhHub
        run: |
          curl -X POST https://clawhub.ai/api/submit \
            -H "Authorization: Bearer ${{ secrets.CLAWHUB_TOKEN }}" \
            -d "repo=${{ github.repository }}&version=${{ github.ref_name }}"

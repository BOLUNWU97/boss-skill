name: Validate Boss Skill

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Check required files
        run: |
          echo "Checking required files..."
          [[ -f SKILL.md ]] || exit 1
          [[ -f README.md ]] || exit 1
          [[ -d prompts/ ]] || exit 1
          [[ -d bosses/ ]] || exit 1
          echo "✅ All required files present"
          
      - name: Count examples
        run: |
          COUNT=$(ls -1 bosses/ | wc -l)
          echo "Boss examples: $COUNT"
          [[ $COUNT -ge 1 ]] || exit 1
          echo "✅ At least one example present"
          
      - name: Validate SKILL.md structure
        run: |
          echo "Checking SKILL.md structure..."
          grep -q "name:" SKILL.md || exit 1
          grep -q "description:" SKILL.md || exit 1
          grep -q "user-invocable:" SKILL.md || exit 1
          echo "✅ SKILL.md structure valid"
